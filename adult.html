<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18+ Premium Movies Section</title>
    <style>
        /* 🌌 Global Dark Theme Style */
        body { 
            background-color: #080c14; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            margin: 0; 
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ff3b30;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 🎬 Movie Grid Layout */
        .movie-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }
        
        @media (min-width: 768px) {
            .movie-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .movie-card { 
            background: #111827; 
            border-radius: 14px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            cursor: pointer; 
            transition: all 0.2s ease;
            position: relative;
        }
        
        .movie-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 59, 48, 0.3);
        }

        /* 🖼️ သင်ပေးထားသော ImgBB ပုံကို Proxy ခံပြီး တိုက်ရိုက်ချိတ်ဆက်ထားသည် */
        .movie-poster { 
            width: 100%; 
            height: 240px; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-image: url('https://images.wsrv.nl/?url=https://i.ibb.co/6wD6HhN/IMG-20260709-190210.jpg');
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; 
        }
        
        .movie-poster::before { 
            content: ''; 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 50%; 
            background: linear-gradient(to top, #111827, transparent); 
        }
        
        /* Premium Play Button Overlay */
        .play-btn { 
            position: absolute; 
            background: #ff3b30; 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.4); 
            transition: 0.2s;
        }
        
        .movie-card:hover .play-btn {
            transform: scale(1.1);
            background: #ff453a;
        }

        .play-icon { 
            width: 0; 
            height: 0; 
            border-top: 8px solid transparent; 
            border-bottom: 8px solid transparent; 
            border-left: 14px solid #fff; 
            margin-left: 4px; 
        }
        
        .movie-info { padding: 12px; text-align: left; }
        .movie-title { 
            font-size: 13px; 
            font-weight: bold; 
            margin: 0 0 5px 0; 
            color: #ffffff; 
            line-height: 1.4; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-meta { font-size: 11px; color: #ff453a; font-weight: 500; }

        /* 🎥 Fullscreen HTML5 Video Player Modal */
        .video-modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000000; 
            z-index: 99999; 
            align-items: center; 
            justify-content: center; 
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            max-height: 100vh; 
            object-fit: contain; 
            background: #000; 
        }
        
        .close-btn { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            color: #ffffff; 
            font-size: 38px; 
            cursor: pointer; 
            z-index: 100000; 
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: 0.2s;
        }
        .close-btn:hover { color: #ff3b30; }
    </style>
</head>
<body>

    <div class="section-title">🔞 18+ Special Premium Movies</div>

    <div class="movie-grid">
        
        <!-- 🎬 ဇာတ်ကား (၁) - IPZZ-037 (ပေးထားသော Thumbnail ပုံ နှင့် ဗီဒီယိုလင့်ခ် အပြီးအစီး ထည့်သွင်းထားသည်) -->
        <div class="movie-card" onclick="openMovie('http://file-to-link-stevebotz-01.koyeb.app/248721/ipzz+037.mp4?hash=AgADSg')">
            <div class="movie-poster">
                <div class="play-btn"><div class="play-icon"></div></div>
            </div>
            <div class="movie-info">
                <h4 class="movie-title">IPZZ-037 Exclusive</h4>
                <span class="movie-meta">🔥 Full HD / JAV Uncensored</span>
            </div>
        </div>

    </div>

    <!-- Website Video Overlay Player -->
    <div id="videoModal" class="video-modal">
        <span class="close-btn" onclick="closeMovie()">✕</span>
        <video id="mp4Player" controls playsinline></video>
    </div>

    <script>
        function openMovie(url) {
            var modal = document.getElementById('videoModal');
            var player = document.getElementById('mp4Player');
            modal.style.display = 'flex';
            player.src = url;
            player.load();
            player.play();

            // 🔄 Website ပေါ်တွင် ဗီဒီယိုဖွင့်သည်နှင့် Fullscreen & Landscape သို့ အလိုအလျောက်ပြောင်းလဲစေမည့်စနစ်
            var docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(function(err) {
                            console.log("Orientation lock is skipped on desktop browsers.");
                        });
                    }
                });
            }
            window.history.pushState({ popup: "open" }, "");
        }
        
        function closeMovie() {
            var modal = document.getElementById('videoModal');
            var player = document.getElementById('mp4Player');
            player.pause();
            player.src = "";
            modal.style.display = 'none';

            // 🔄 Fullscreen မှ ပြန်ထွက်စေခြင်း
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(() => {});
            }
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
        }
        window.onpopstate = function() { closeMovie(); };
    </script>
</body>
</html>
