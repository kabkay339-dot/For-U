<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: -apple-system, sans-serif; padding: 15px; margin: 0; padding-bottom: 50px; }
        
        /* 📱 Navigation Tabs */
        .tab-container { display: flex; overflow-x: auto; white-space: nowrap; background-color: #111827; padding: 10px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); gap: 10px; -webkit-overflow-scrolling: touch; }
        .tab-container::-webkit-scrollbar { display: none; }
        .tab-btn { background: none; border: none; color: #94a3b8; padding: 8px 16px; font-size: 14px; font-weight: bold; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background-color: #1e293b; color: #38bdf8; box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.2); }
        .tab-btn.tab-18plus.active { color: #ff453a; box-shadow: inset 0 0 0 1px rgba(255, 69, 58, 0.3); }

        .app-section { display: none; }
        .app-section.active { display: block; }

        /* Styles for Cards */
        .outline-card { background: #1e293b; border-radius: 16px; padding: 20px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .tv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .tv-card { background: #111827; border-radius: 14px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
        .tv-thumb { width: 100%; height: 160px; background-size: cover; background-position: center; position: relative; }
        .tv-info { padding: 12px; text-align: left; }
        .tv-title { font-size: 13px; font-weight: bold; margin: 0; color: #ffffff; }
        .tv-meta { font-size: 11px; color: #ff453a; font-weight: 500; margin-top: 4px; display: block; }
        
        .video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { width: 100%; height: 100%; max-width: 800px; display: flex; align-items: center; justify-content: center; position: relative; }
        iframe, video { width: 100%; height: 100%; border: none; display: none; background: #000; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 35px; cursor: pointer; z-index: 10000; }
    </style>
</head>
<body>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchSection('outline-sec', this)">Daily Keys</button>
        <button class="tab-btn" onclick="switchSection('highlights-sec', this)">Highlights</button>
        <button class="tab-btn" onclick="switchSection('livetv-sec', this)">Live TV</button>
        <button class="tab-btn tab-18plus" onclick="switchSection('adult-sec', this)">🔞 18+ Movies</button>
    </div>

    <!-- 1. Outline Section -->
    <div id="outline-sec" class="app-section active">
        <div class="outline-card">
            <div class="tv-title">🇺🇸 US Server</div>
            <div style="font-family: monospace; font-size: 12px; padding: 10px; background: #000;">ss://YWVzLTI1Ni1nY206ZmFCQW9ENTRrR0dVSkc3Q3lPSTcyLjI0NS4yMzUuODQ6MjM3NSNfVW5pdGVkIFN0YXRlcy0jMzc2NTYtLSUwVXRsaW5lS2V5cy5jb20=</div>
        </div>
    </div>

    <!-- 2. Highlights Section -->
    <div id="highlights-sec" class="app-section">
        <div class="tv-card" onclick="openMedia('https://www.youtube.com/embed/F-n62fQa0Fg', 'youtube')">
            <div class="tv-thumb" style="background-image: url('https://img.youtube.com/vi/F-n62fQa0Fg/hqdefault.jpg');"></div>
            <div class="tv-info"><h4 class="tv-title">Football Highlights</h4></div>
        </div>
    </div>

    <!-- 3. Live TV Section -->
    <div id="livetv-sec" class="app-section">
        <div class="tv-grid">
            <div class="tv-card" onclick="openMedia('http://103.215.194.93:8282/hls/fortunetv/vmix.m3u8', 'hls')">
                <div class="tv-thumb" style="background-image: url('https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=400');"></div>
                <div class="tv-info"><h4 class="tv-title">Fortune TV</h4></div>
            </div>
        </div>
    </div>

    <!-- 4. 18+ Movies Section (အသစ်ရလာတဲ့ Telegram Public Link နှင့် ကားဟောင်းကို ပေါင်းထားသည်) -->
    <div id="adult-sec" class="app-section">
        <div class="tv-grid">
            <!-- 🎬 ကတ်ပြား ၁ - လူကြီးမင်းအသစ်ပေးသော Telegram Public Link (ခေါင်းစဉ်အမှန်ပြင်ပြီး) -->
            <div class="tv-card" onclick="openMedia('https://t.me/embed/porn_1879/2?userpic=false', 'telegram')">
                <div class="tv-thumb" style="background-image: url('https://images.unsplash.com/photo-1598899134739-24c46f58b8c0?w=400');"></div>
                <div class="tv-info">
                    <h4 class="tv-title">မြန်မာ 18+ Exclusive</h4>
                    <span class="tv-meta">🔥 Telegram Stream</span>
                </div>
            </div>
            
            <!-- 🎬 ကတ်ပြား ၂ - IPZZ-037 Movie (MP4) -->
            <div class="tv-card" onclick="openMedia('http://file-to-link-stevebotz-01.koyeb.app/248721/ipzz+037.mp4?hash=AgADSg', 'mp4')">
                <div class="tv-thumb" style="background-image: url('https://images.wsrv.nl/?url=https://i.ibb.co/6wD6HhN/IMG-20260709-190210.jpg');"></div>
                <div class="tv-info">
                    <h4 class="tv-title">IPZZ-037 Hot</h4>
                    <span class="tv-meta">🔥 JAV Uncensored</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="videoModal" class="video-modal">
        <span class="close-btn" onclick="closeMedia()">✕</span>
        <div class="modal-content">
            <iframe id="iframePlayer"></iframe>
            <video id="nativePlayer" controls playsinline></video>
        </div>
    </div>

    <script>
        var hls = null;
        function switchSection(id, btn) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function openMedia(url, type) {
            var modal = document.getElementById('videoModal');
            var iframe = document.getElementById('iframePlayer');
            var video = document.getElementById('nativePlayer');
            modal.style.display = 'flex';
            
            if (type === 'youtube' || type === 'telegram') {
                video.style.display = 'none'; iframe.style.display = 'block';
                iframe.src = url;
            } else if (type === 'mp4') {
                iframe.style.display = 'none'; video.style.display = 'block';
                video.src = url; video.play();
            } else if (type === 'hls') {
                iframe.style.display = 'none'; video.style.display = 'block';
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
        }

        function closeMedia() {
            var modal = document.getElementById('videoModal');
            document.getElementById('iframePlayer').src = "";
            document.getElementById('nativePlayer').pause();
            document.getElementById('nativePlayer').src = "";
            if(hls) { hls.destroy(); hls = null; }
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
