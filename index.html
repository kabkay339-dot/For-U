<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .page-title { font-size: 18px; font-weight: bold; color: #38bdf8; margin-bottom: 20px; text-align: center; font-style: italic; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Premium Card Design */
        .video-card { background: #1e293b; border-radius: 16px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); position: relative; cursor: pointer; }
        .thumb-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background-size: cover; background-position: center; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; }
        
        /* Play Button Icon */
        .play-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #ef4444, #b91c1c); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); font-size: 24px; color: white; padding-left: 4px; }
        
        .video-info { padding: 15px; background: linear-gradient(to bottom, #1e293b, #111827); }
        .video-title { font-size: 15px; font-weight: bold; margin: 0 0 5px 0; color: #ffffff; line-height: 1.4; }
        .video-meta { font-size: 12px; color: #38bdf8; font-weight: 500; }

        /* Fullscreen Video Popup (Modal) */
        .video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { width: 95%; max-width: 700px; position: relative; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }
        .modal-content iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .close-btn { position: absolute; top: -40px; right: 10px; color: #fff; font-size: 30px; font-weight: bold; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

    <div class="page-title">⚽ LIVE HIGHLIGHTS</div>

    <div class="video-card" onclick="openVideo('F-n62fQa0Fg')">
        <div class="thumb-wrapper" style="background-image: url('https://img.youtube.com/vi/F-n62fQa0Fg/maxresdefault.jpg');">
            <div class="overlay">
                <div class="play-icon">▶</div>
            </div>
        </div>
        <div class="video-info">
            <h3 class="video-title">New Highlight Video</h3>
            <span class="video-meta">⏱️ 00:00 Mins • HD</span>
        </div>
    </div>


    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeVideo()">×</button>
            <iframe id="videoPlayer" src="" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        // ဗီဒီယို ဖွင့်လိုက်တဲ့အခါ
        function openVideo(videoId) {
            var modal = document.getElementById('videoModal');
            var player = document.getElementById('videoPlayer');
            player.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
            modal.style.display = 'flex';

            // ဖုန်းရဲ့ Back History ထဲကို Virtual Page တစ်ခု တိုးလိုက်ပါတယ် (ဒါမှ Back နှိပ်ရင် App ထဲက မထွက်မှာပါ)
            window.history.pushState({ popup: "open" }, "");
        }

        // ဗီဒီယို ပိတ်လိုက်တဲ့အခါ (Close Button နှိပ်ရင် ဖြစ်စေ၊ ဖုန်း Back ခလုတ်နှိပ်ရင်ဖြစ်စေ)
        function closeVideo() {
            var modal = document.getElementById('videoModal');
            var player = document.getElementById('videoPlayer');
            player.src = ""; 
            modal.style.display = 'none';
        }

        // ဖုန်းရဲ့ Hardware Back Button နှိပ်လိုက်တာကို ဖမ်းတဲ့စနစ်
        window.onpopstate = function(event) {
            var modal = document.getElementById('videoModal');
            // အကယ်၍ Popup ပွင့်နေရင် Popup ကိုပဲ ပိတ်လိုက်မယ်
            if (modal.style.display === 'flex') {
                closeVideo();
            }
        };
    </script>

</body>
</html>
